name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 5.0.0)'
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Validate version input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version: $VERSION (expected X.Y.Z)"
            exit 1
          fi
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Poetry
        run: pipx install poetry

      - name: Check version matches pyproject.toml
        env:
          VERSION: ${{ inputs.version }}
        run: |
          PYPROJECT_VERSION="$(poetry version --short)"
          if [ "$PYPROJECT_VERSION" != "$VERSION" ]; then
            echo "Version mismatch: pyproject.toml has $PYPROJECT_VERSION, input is $VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: poetry install --all-extras

      - name: Run tests
        run: poetry run pytest

      - name: Build distributions
        run: poetry build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Extract release notes from changelog
        env:
          VERSION: ${{ inputs.version }}
        run: |
          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if ! [ -s release-notes.md ]; then
            echo "No changelog section found for $VERSION" > release-notes.md
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file release-notes.md \
            dist/*
