name: System Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  live-tests:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'ipregistry'

    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: '3.14'
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run tests against the live API
        run: uv run pytest
        env:
          IPREGISTRY_API_KEY: ${{ secrets.IPREGISTRY_API_KEY }}
