name: System Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  live-tests:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'ipregistry'

    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install
      - name: Run tests against the live API
        run: poetry run pytest
        env:
          IPREGISTRY_API_KEY: ${{ secrets.IPREGISTRY_API_KEY }}
