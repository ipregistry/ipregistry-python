[tool.poetry]
authors = [
    'Ipregistry Team <support@ipregistry.co>',
    'Laurent Pellegrino <laurent.pellegrino@ipregistry.co>'
]
description = 'Official Python library for Ipregistry'
homepage = 'https://ipregistry.co'
keywords = [
    'ipinfo',
    'ipregistry',
    'ip-address',
    'ip-data',
    'ip-geolocation',
    'threat-detection',
    'user-agent-parsing'
]
name = 'ipregistry'
license = 'Apache-2.0'
readme = 'README.md'
repository = 'https://github.com/ipregistry/ipregistry-python'
version = '4.0.0'

[tool.poetry.dependencies]
cachetools = '^7.1.4'
pydantic = "^2.13.4"
python = '>=3.10'
requests = '^2.34.2'
httpx = {version = "^0.28.1", optional = true}

[tool.poetry.extras]
async = ["httpx"]

[tool.poetry.group.dev.dependencies]
pytest = '>=9.1.1'
requests-mock = "^1.12.1"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
